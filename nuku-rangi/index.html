<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuku Rangi - Guias de Aventura</title>
<link href="https://fonts.googleapis.com/css2?family=Mona+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;
  --border:#30363d;--border2:#444c56;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --green:#3fb950;--green2:#238636;
  --blue:#58a6ff;--sand:#c4a97d;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Mona Sans','Segoe UI',system-ui,sans-serif;font-weight:400;overflow-x:hidden;line-height:1.6}
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:62px;display:flex;align-items:center;padding:0 2rem;background:rgba(13,17,23,0.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.nav-in{max-width:1280px;width:100%;margin:0 auto;display:flex;align-items:center;gap:1.5rem}
.logo{display:flex;align-items:center;gap:.5rem;text-decoration:none}
.logo-dot{width:28px;height:28px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;color:#000;flex-shrink:0}
.logo-t{font-size:.95rem;font-weight:600;color:var(--text)}
.logo-t span{color:var(--green)}
.nl{display:flex;gap:.1rem}
.nl a{font-size:.85rem;font-weight:500;color:var(--text2);text-decoration:none;padding:.35rem .7rem;border-radius:6px;transition:color .15s,background .15s}
.nl a:hover{color:var(--text);background:var(--bg3)}
.nr{display:flex;align-items:center;gap:.75rem;margin-left:auto}
.btn-g{font-size:.85rem;font-weight:500;color:var(--text2);text-decoration:none;padding:.35rem .7rem;border-radius:6px;transition:color .15s}
.btn-g:hover{color:var(--text)}
.btn-cta{font-size:.85rem;font-weight:500;color:#000;background:var(--green);padding:.38rem 1rem;border-radius:6px;text-decoration:none;transition:background .15s}
.btn-cta:hover{background:#45c957}
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8rem 2rem 5rem;position:relative;overflow:hidden}
.hbg{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.55) 0%,rgba(0,0,0,.35) 50%,rgba(0,0,0,.65) 100%);z-index:1}
.hgrid{display:none}
.hbadge{display:inline-flex;align-items:center;gap:.5rem;background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);color:var(--green);font-size:.78rem;font-weight:500;padding:.35rem 1rem;border-radius:2rem;margin-bottom:2rem;opacity:0;animation:fu .8s .2s forwards;position:relative}
